context:
  version: "4.7.1"
  sha256: 8085d6757505b6f3291a2638c84d207e8f0ad0de662d1f46aa2f77e658a0c976
  python_min: "3.9"

package:
  name: flask-jwt-extended
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flask-jwt-extended/flask_jwt_extended-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - flask >=2.0,<4.0
    - pyjwt >=2.0,<3.0
    - python >=${{ python_min }}
    - werkzeug >=0.14

tests:
  - python:
      imports:
        - flask_jwt_extended
      pip_check: true
  - script:
      - python -c "import flask_jwt_extended"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE
  summary: A Flask JWT extension
  description: |
    A Flask JWT extension that supports refresh tokens, blacklisting/revoking tokens,
    and token freshness (for accessing critical views)
  homepage: https://github.com/vimalloc/flask-jwt-extended

extra:
  recipe-maintainers:
    - lvoliveira
    - nicoddemus
    - synapticarbors
